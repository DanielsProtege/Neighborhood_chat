<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neighborhood Chat</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-inter h-screen flex flex-col overflow-hidden w-full">

    <!-- Nickname Modal -->
    <div id="nickname-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-11/12 max-w-sm p-6 transform transition-all scale-100">
            <h2 class="text-2xl font-semibold mb-2 text-center text-indigo-600">Welcome</h2>
            <p class="text-sm text-gray-500 mb-6 text-center">Enter a nickname to join your neighborhood chat.</p>
            <form id="nickname-form">
                <input type="text" id="nickname-input" required placeholder="Choose a nickname..." class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4 transition-shadow">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-colors">Join Chat</button>
            </form>
        </div>
    </div>

    <!-- Location Request Modal -->
    <div id="location-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-11/12 max-w-sm p-6 transform transition-all scale-100 text-center">
            <h2 class="text-2xl font-semibold mb-2 text-indigo-600">Location Access</h2>
            <p class="text-sm text-gray-500 mb-6">We need your location to connect you with your neighborhood grid (~1km radius).</p>
            <div id="location-spinner" class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p id="location-status" class="text-indigo-600 font-medium animate-pulse">Locating...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-indigo-600 text-white shadow-md py-4 px-4 flex justify-between items-center z-10 sticky top-0">
        <div class="flex flex-col">
            <h1 class="text-lg font-bold tracking-wide">Neighborhood Chat</h1>
            <p id="neighborhood-label" class="text-xs text-indigo-200">Locating...</p>
        </div>
        <div class="text-xs bg-indigo-500/50 px-3 py-1 rounded-full border border-indigo-400">
            <span id="user-nickname"></span>
        </div>
    </header>

    <!-- Chat Feed -->
    <main id="chat-feed" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 scroll-smooth pb-[100px]">
        <!-- Messages will be injected here -->
    </main>

    <!-- Fixed Bottom Input -->
    <div class="bg-white border-t border-gray-200 p-2 sm:p-4 z-10 fixed bottom-0 left-0 w-full mb-safe">
        <form id="chat-form" class="flex items-end gap-2 max-w-4xl mx-auto w-full">
            <textarea id="chat-input" rows="1" placeholder="Message your neighborhood..." class="flex-1 bg-gray-100 rounded-3xl py-3 px-5 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none max-h-32 min-h-[48px] overflow-x-hidden overflow-y-auto leading-tight transition-all"></textarea>
            <button type="submit" class="bg-indigo-600 text-white rounded-full p-3 h-[48px] w-[48px] flex items-center justify-center hover:bg-indigo-700 transition-colors shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 -ml-0.5 mt-0.5">
                  <path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" />
                </svg>
            </button>
        </form>
    </div>

    <!-- Socket.io & App Logic -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
